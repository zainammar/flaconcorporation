<div id="content2" class="content-box">Loading second file...</div>
<script>
    window.addEventListener('DOMContentLoaded', () => {
      // You can change the file names here
      const filesToLoad = {
        content1: 'page1.html',
        content2: 'page2.html'
      };
    
      // Loop through and load each file into its matching div
      for (const [divId, filename] of Object.entries(filesToLoad)) {
        fetch(filename)
          .then(response => {
            if (!response.ok) throw new Error(`File not found: ${filename}`);
            return response.text();
          })
          .then(data => {
            document.getElementById(divId).innerHTML = data;
          })
          .catch(error => {
            document.getElementById(divId).innerHTML = `<p style="color:red">${error.message}</p>`;
          });
      }
    });
    </script>
